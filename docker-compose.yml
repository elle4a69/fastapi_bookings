version: "3.9"

services:
  web:
    build: .
    container_name: fastapi_bookings
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - FRONTEND_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./app:/app/app
      - ./fastapi_bookings.db:/app/fastapi_bookings.db